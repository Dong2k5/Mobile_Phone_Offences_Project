<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Scatter Plot - Population vs Offences</title>
</head>

<body>
    <h2>Population vs Offences</h2>

    <label>Scatter Filter:</label>
    <select id="scatterFilter">
        <option value="All">All</option>
    </select>

    <div id="scatter-container"></div>

    <hr>

    <h2>Enforcement Strategy</h2>

    <label>Stacked Bar Filter:</label>
    <h3>Filter Enforcement Type</h3>

    <label><input type="checkbox" value="fines" checked> Fines</label>
    <label><input type="checkbox" value="arrests" checked> Arrests</label>
    <label><input type="checkbox" value="charges" checked> Charges</label>

    <div id="stacked-container"></div>

    <hr>

    <p>Which jurisdictions change rank the most after normalization?</p>
    <h2>Rank Change</h2>
    <label>Side by side bar Chart</label>
    <div id="rank-container"></div>
    <p>Does a state’s ranking change when we adjust for population?</p>

    <hr>
    <h2>Choropleth Map</h2>
    <div id="map-container"></div>

    <script type="module" src="./js/population/loadData.js"></script>
    <script type="module" src="./js/sharedConstants.js"></script>
    <script type="module" src="./js/population/scatterPlot.js"></script>
    <script type="module" src="./js/population/stackedBar.js"></script>
    <script type="module" src="./js/population/rankChange.js"></script>
    <script type="module" src="./js/population/map.js"></script>

</body>

</html>
